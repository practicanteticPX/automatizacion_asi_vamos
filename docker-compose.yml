x-shared: &shared
  restart: unless-stopped
  build:
    context: .
    dockerfile: Dockerfile.n8n
  user: root
  environment:
    - N8N_SECURE_COOKIE=false
    - NODE_FUNCTION_ALLOW_EXTERNAL=ldapjs
    - NODE_FUNCTION_ALLOW_BUILTIN=fs,child_process
    - DOCKER_API_VERSION=1.44
    - N8N_DEFAULT_PROJECT_ENABLED=true
    - N8N_ENTERPRISE_FEATURES_ENABLED=true

    # --- Permitir acceso a recursos ---
    - N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES=false
    - NODES_EXCLUDE=[]
    - N8N_RESTRICT_FILE_ACCESS_TO=/data/compartido

    # --- DB interna de n8n ---
    - DB_TYPE=postgresdb
    - DB_POSTGRESDB_HOST=postgres
    - DB_POSTGRESDB_PORT=5432
    - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
    - DB_POSTGRESDB_USER=${POSTGRES_USER}
    - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}

    # --- Cola Redis ---
    - EXECUTIONS_MODE=queue
    - QUEUE_BULL_REDIS_HOST=redis
    - QUEUE_HEALTH_CHECK_ACTIVE=true

    # --- Recomendadas ---
    - N8N_ENCRYPTION_KEY=${ENCRYPTION_KEY}
    - GENERIC_TIMEZONE=America/Bogota
    - TZ=America/Bogota
    - N8N_RUNNERS_ENABLED=false
    - EXECUTIONS_DATA_PRUNE=true
    - EXECUTIONS_DATA_MAX_AGE=30
    - WEBHOOK_URL=https://n8n-prexxa.duckdns.org/

  volumes:
    # Persistencia n8n (bind mount)
    - ./data_n8n:/home/node/.n8n

    # Compartidos (ojo: esto es ruta WSL; si te falla en Windows, lo ajustamos)
    - /d/n8n/n8n_compartido:/data/compartido

    # SSH keys
    # - ./ssh_keys:/home/node/.ssh:ro

    # Hora
    - /etc/localtime:/etc/localtime:ro
    - /etc/timezone:/etc/timezone:ro

    # Docker socket
    - /var/run/docker.sock:/var/run/docker.sock

  depends_on:
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy
    pgbouncer:
      condition: service_started

services:
  # DB interna de n8n
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB
    volumes:
      - ./data_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Redis para queue
  redis:
    image: redis:6-alpine
    restart: unless-stopped
    volumes:
      - ./data_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Proxy mTLS REAL (Postgres protocol) hacia 10.50.7.4:5432
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    volumes:
      - ./pgbouncer:/etc/pgbouncer:ro
      - ./certs:/certs:ro

  # n8n main
  n8n:
    <<: *shared
    ports:
      - "5678:5678"

  # n8n worker
  n8n-worker:
    <<: *shared
    command: worker
    depends_on:
      - n8n

